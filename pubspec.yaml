name: tr_atheletic_development
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.11.0
  firebase_analytics: ^12.4.3
  firebase_auth: ^6.5.4
  firebase_crashlytics: ^5.2.4
  cloud_firestore: ^6.0.2
  # State management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7

  # Dependency injection
  get_it: ^8.0.3

  # JSON code generation
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0
  freezed: ^2.4.7
  freezed_annotation: ^2.4.0

  # UI utils
  fluttertoast: ^8.2.10
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1

  # Responsive
  flutter_screenutil: ^5.9.3

  # Localization
  easy_localization: ^3.0.7

  cupertino_icons: ^1.0.8
  skeletonizer: ^2.1.3
  package_info_plus: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/translations/
    - assets/images/

  fonts:
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-Light.ttf
          weight: 300
        - asset: assets/fonts/NotoSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansArabic-Bold.ttf
          weight: 700
